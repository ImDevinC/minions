# ConfigMaps for the minions system
# Contains configuration files mounted into pods

---
# Database migrations for the orchestrator
# Runs as init container before orchestrator starts
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-migrations
  namespace: minions
  labels:
    app.kubernetes.io/part-of: minions
data:
  001_create_users_table.sql: |
    CREATE TABLE IF NOT EXISTS users (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        discord_id TEXT NOT NULL,
        discord_username TEXT NOT NULL,
        avatar_url TEXT,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        CONSTRAINT users_discord_id_unique UNIQUE (discord_id)
    );
    CREATE INDEX IF NOT EXISTS idx_users_discord_id ON users(discord_id);
    COMMENT ON TABLE users IS 'Users authenticated via Discord OAuth';
    COMMENT ON COLUMN users.discord_id IS 'Discord user ID (snowflake as text)';
    COMMENT ON COLUMN users.discord_username IS 'Discord username at time of last login';
    COMMENT ON COLUMN users.avatar_url IS 'Discord avatar URL, nullable';

  002_create_minions_table.sql: |
    CREATE TABLE IF NOT EXISTS minions (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        repo TEXT NOT NULL,
        task TEXT NOT NULL,
        model TEXT NOT NULL,
        status TEXT NOT NULL DEFAULT 'pending' CHECK (
            status IN ('pending', 'awaiting_clarification', 'running', 'completed', 'failed', 'terminated')
        ),
        clarification_question TEXT,
        clarification_answer TEXT,
        clarification_message_id TEXT,
        input_tokens BIGINT NOT NULL DEFAULT 0,
        output_tokens BIGINT NOT NULL DEFAULT 0,
        cost_usd NUMERIC(12, 6) NOT NULL DEFAULT 0,
        pr_url TEXT,
        error TEXT,
        session_id TEXT,
        pod_name TEXT,
        discord_message_id TEXT,
        discord_channel_id TEXT,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        started_at TIMESTAMPTZ,
        completed_at TIMESTAMPTZ,
        last_activity_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS idx_minions_user_id ON minions(user_id);
    COMMENT ON TABLE minions IS 'Minion task instances with full lifecycle tracking';
    COMMENT ON COLUMN minions.status IS 'pending | awaiting_clarification | running | completed | failed | terminated';
    COMMENT ON COLUMN minions.clarification_message_id IS 'Discord message ID for reply lookup';
    COMMENT ON COLUMN minions.cost_usd IS 'Accumulated cost in USD (up to 6 decimal places)';
    COMMENT ON COLUMN minions.session_id IS 'OpenCode session ID for the task';
    COMMENT ON COLUMN minions.pod_name IS 'Kubernetes pod name when running';
    COMMENT ON COLUMN minions.last_activity_at IS 'Updated on each event for watchdog idle detection';

  003_create_minion_events_table.sql: |
    CREATE TABLE IF NOT EXISTS minion_events (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        minion_id UUID NOT NULL REFERENCES minions(id) ON DELETE CASCADE,
        timestamp TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        event_type TEXT NOT NULL,
        content JSONB NOT NULL DEFAULT '{}'
    );
    CREATE INDEX IF NOT EXISTS idx_minion_events_minion_id_timestamp 
        ON minion_events(minion_id, timestamp);
    COMMENT ON TABLE minion_events IS 'Append-only event log for minion activity streaming';
    COMMENT ON COLUMN minion_events.event_type IS 'Event type (e.g., message, tool_call, token_usage, error)';
    COMMENT ON COLUMN minion_events.content IS 'Event payload as JSONB for flexible schema';

  004_create_indexes.sql: |
    CREATE INDEX IF NOT EXISTS idx_minions_status ON minions(status);
    CREATE INDEX IF NOT EXISTS idx_minions_status_last_activity_at ON minions(status, last_activity_at);
    CREATE INDEX IF NOT EXISTS idx_minions_clarification_message_id ON minions(clarification_message_id)
        WHERE clarification_message_id IS NOT NULL;
    COMMENT ON INDEX idx_minions_status IS 'Speeds up status filtering on list endpoints';
    COMMENT ON INDEX idx_minions_status_last_activity_at IS 'Watchdog query: running minions with stale last_activity_at';
    COMMENT ON INDEX idx_minions_clarification_message_id IS 'Partial index for clarification reply lookup';

  005_add_opencode_password.sql: |
    -- Add opencode_password column for per-minion SSE authentication
    -- Nullable: passwords only exist during active execution
    ALTER TABLE minions ADD COLUMN opencode_password TEXT NULL;

  006_remove_opencode_password.sql: |
    -- Remove opencode_password column (no longer using password authentication for SSE)
    -- SSE now relies on trusted pod network instead of per-minion credentials
    ALTER TABLE minions DROP COLUMN IF EXISTS opencode_password;

  007_add_token_detail_fields.sql: |
    -- Add granular token tracking fields for better cost analysis
    ALTER TABLE minions ADD COLUMN IF NOT EXISTS reasoning_tokens BIGINT NOT NULL DEFAULT 0;
    ALTER TABLE minions ADD COLUMN IF NOT EXISTS cache_read_tokens BIGINT NOT NULL DEFAULT 0;
    ALTER TABLE minions ADD COLUMN IF NOT EXISTS cache_write_tokens BIGINT NOT NULL DEFAULT 0;
    COMMENT ON COLUMN minions.reasoning_tokens IS 'Extended thinking tokens (Claude models)';
    COMMENT ON COLUMN minions.cache_read_tokens IS 'Prompt cache read tokens';
    COMMENT ON COLUMN minions.cache_write_tokens IS 'Prompt cache write tokens';

  008_add_matrix_fields.sql: |
    -- Migration: 008_add_matrix_fields.sql
    -- Adds Matrix-specific fields for Matrix bot integration
    ALTER TABLE users ADD COLUMN IF NOT EXISTS matrix_id TEXT;
    CREATE INDEX IF NOT EXISTS idx_users_matrix_id ON users(matrix_id) WHERE matrix_id IS NOT NULL;
    ALTER TABLE minions ADD COLUMN IF NOT EXISTS matrix_event_id TEXT;
    ALTER TABLE minions ADD COLUMN IF NOT EXISTS matrix_room_id TEXT;
    ALTER TABLE minions ADD COLUMN IF NOT EXISTS matrix_clarification_event_id TEXT;
    ALTER TABLE minions ADD COLUMN IF NOT EXISTS platform TEXT NOT NULL DEFAULT 'discord';
    ALTER TABLE minions ADD CONSTRAINT minions_platform_check CHECK (platform IN ('discord', 'matrix'));
    COMMENT ON COLUMN users.matrix_id IS 'Matrix user ID (e.g., @user:matrix.org)';
    COMMENT ON COLUMN minions.matrix_event_id IS 'Matrix event ID that triggered this minion';
    COMMENT ON COLUMN minions.matrix_room_id IS 'Matrix room ID where the minion was requested';
    COMMENT ON COLUMN minions.matrix_clarification_event_id IS 'Matrix event ID for clarification reply lookup';
    COMMENT ON COLUMN minions.platform IS 'Platform that initiated the minion: discord or matrix';

  009_add_matrix_id_unique_constraint.sql: |
    -- Add unique constraint on matrix_id for ON CONFLICT support
    ALTER TABLE users ADD CONSTRAINT users_matrix_id_unique UNIQUE (matrix_id);

  010_add_github_fields.sql: |
    -- Migration: 010_add_github_fields.sql
    -- Adds GitHub user identity and PR feedback flow support
    ALTER TABLE users ADD COLUMN IF NOT EXISTS github_id TEXT;
    ALTER TABLE users ADD COLUMN IF NOT EXISTS github_username TEXT;
    CREATE UNIQUE INDEX IF NOT EXISTS idx_users_github_id ON users(github_id) WHERE github_id IS NOT NULL;
    ALTER TABLE minions ADD COLUMN IF NOT EXISTS branch TEXT;
    ALTER TABLE minions ADD COLUMN IF NOT EXISTS source_pr_url TEXT;
    ALTER TABLE minions ADD COLUMN IF NOT EXISTS github_comment_id TEXT;
    ALTER TABLE minions DROP CONSTRAINT IF EXISTS minions_platform_check;
    ALTER TABLE minions ADD CONSTRAINT minions_platform_check CHECK (platform IN ('discord', 'matrix', 'github'));
    CREATE INDEX IF NOT EXISTS idx_minions_source_pr_active ON minions(source_pr_url) WHERE source_pr_url IS NOT NULL AND status IN ('pending', 'running');
    COMMENT ON COLUMN users.github_id IS 'GitHub user ID (numeric as text)';
    COMMENT ON COLUMN users.github_username IS 'GitHub username at time of last interaction';
    COMMENT ON COLUMN minions.branch IS 'Target branch to clone (for PR feedback flow)';
    COMMENT ON COLUMN minions.source_pr_url IS 'PR URL this minion is addressing (set at creation, not completion)';
    COMMENT ON COLUMN minions.github_comment_id IS 'GitHub comment ID that triggered this minion';

  011_fix_user_constraints.sql: |
    -- Migration: 011_fix_user_constraints.sql
    -- Fix user table constraints to support multi-platform users (Discord, Matrix, GitHub)
    -- Previously discord_id was NOT NULL which breaks when creating Matrix/GitHub-only users
    ALTER TABLE users ALTER COLUMN discord_id DROP NOT NULL;
    ALTER TABLE users ALTER COLUMN discord_username DROP NOT NULL;
    UPDATE users SET discord_id = NULL WHERE discord_id = '';
    UPDATE users SET discord_username = NULL WHERE discord_username = '';
    ALTER TABLE users DROP CONSTRAINT IF EXISTS users_discord_id_unique;
    CREATE UNIQUE INDEX IF NOT EXISTS idx_users_discord_id_unique ON users(discord_id) WHERE discord_id IS NOT NULL;
    ALTER TABLE users DROP CONSTRAINT IF EXISTS users_matrix_id_unique;
    CREATE UNIQUE INDEX IF NOT EXISTS idx_users_matrix_id_unique ON users(matrix_id) WHERE matrix_id IS NOT NULL;
    COMMENT ON COLUMN users.discord_id IS 'Discord user ID (snowflake as text), NULL for non-Discord users';
    COMMENT ON COLUMN users.discord_username IS 'Discord username at time of last login, NULL for non-Discord users';

---
# GitHub Webhook approved repos configuration
# Lists repos that can trigger minion spawning via PR comments
apiVersion: v1
kind: ConfigMap
metadata:
  name: github-webhook-config
  namespace: minions
  labels:
    app.kubernetes.io/name: github-webhook
    app.kubernetes.io/part-of: minions
data:
  approved-repos.txt: |
    # Add approved repos here, one per line (owner/repo format)
    # Example:
    # imdevinc/minions
    # imdevinc/other-repo
