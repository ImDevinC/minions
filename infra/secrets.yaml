# Kubernetes secrets for the minions system
# IMPORTANT: These are templates - actual values must be base64-encoded before applying
#
# To create a secret from literal values:
#   kubectl create secret generic <name> -n minions --from-literal=key=value
#
# Or encode manually:
#   echo -n "your-value" | base64
#
# Best practice: Use external-secrets or sealed-secrets for production
# https://external-secrets.io/
# https://sealed-secrets.netlify.app/

---
# Database credentials for PostgreSQL
# Used by: orchestrator
apiVersion: v1
kind: Secret
metadata:
  name: minions-db
  namespace: minions
  labels:
    app.kubernetes.io/part-of: minions
type: Opaque
stringData:
  # PostgreSQL connection string
  # Format: postgres://user:password@host:port/dbname?sslmode=require
  DATABASE_URL: "REPLACE_ME"

---
# API keys for LLM providers (OpenRouter)
# Used by: orchestrator (DEVBOX_* vars passed to devbox pods with prefix stripped), discord-bot (clarification LLM)
apiVersion: v1
kind: Secret
metadata:
  name: minions-llm-keys
  namespace: minions
  labels:
    app.kubernetes.io/part-of: minions
type: Opaque
stringData:
  # OpenRouter API key for discord-bot clarification LLM
  # Get your OpenRouter key at: https://openrouter.ai/settings/keys
  OPENROUTER_API_KEY: "REPLACE_ME"
  # Same key but with DEVBOX_ prefix - passed to devbox as OPENROUTER_API_KEY (prefix stripped)
  DEVBOX_OPENROUTER_API_KEY: "REPLACE_ME"
  # OpenRouter model used by discord-bot for clarification checks
  OPENROUTER_CLARIFICATION_MODEL: "anthropic/claude-sonnet-4"

---
# GitHub App credentials
# Used by: orchestrator (for installation token generation), github-webhook (for reactions/comments)
apiVersion: v1
kind: Secret
metadata:
  name: minions-github-app
  namespace: minions
  labels:
    app.kubernetes.io/part-of: minions
type: Opaque
stringData:
  # GitHub App ID (numeric)
  GITHUB_APP_ID: "REPLACE_ME"
  # PEM-encoded private key (include -----BEGIN RSA PRIVATE KEY----- headers)
  # Tip: For multi-line values, use kubectl create secret:
  #   kubectl create secret generic minions-github-app -n minions \
  #     --from-literal=GITHUB_APP_ID=123456 \
  #     --from-file=GITHUB_APP_PRIVATE_KEY=./private-key.pem \
  #     --from-literal=GITHUB_WEBHOOK_SECRET=your-webhook-secret
  GITHUB_APP_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_WITH_YOUR_PRIVATE_KEY
    -----END RSA PRIVATE KEY-----
  # Webhook secret for payload signature verification (used by github-webhook service)
  # Generate with: openssl rand -hex 32
  # Configure this same value in GitHub App webhook settings
  GITHUB_WEBHOOK_SECRET: "REPLACE_ME"

---
# Discord bot token
# Used by: discord-bot
apiVersion: v1
kind: Secret
metadata:
  name: minions-discord-bot
  namespace: minions
  labels:
    app.kubernetes.io/part-of: minions
type: Opaque
stringData:
  # Bot token from Discord Developer Portal
  DISCORD_BOT_TOKEN: "REPLACE_ME"
  # Optional: Restrict command execution to one guild
  # DISCORD_ALLOWED_GUILD_ID: "123456789012345678"
  # Optional: Restrict command execution to one role (within allowed guild)
  # DISCORD_ALLOWED_ROLE_ID: "987654321098765432"

---
# Matrix bot credentials
# Used by: matrix-bot
apiVersion: v1
kind: Secret
metadata:
  name: minions-matrix-bot
  namespace: minions
  labels:
    app.kubernetes.io/part-of: minions
type: Opaque
stringData:
  # Matrix homeserver URL (e.g., https://matrix.org)
  MATRIX_HOMESERVER_URL: "REPLACE_ME"
  # Bot user ID (e.g., @minion:matrix.org)
  MATRIX_BOT_USER_ID: "REPLACE_ME"
  # Bot access token (obtained via login or registration)
  MATRIX_BOT_ACCESS_TOKEN: "REPLACE_ME"
  # Optional: Comma-separated list of allowed room IDs
  # When set, bot only responds in these rooms
  # MATRIX_ALLOWED_ROOMS: "!roomid1:matrix.org,!roomid2:matrix.org"

---
# Internal API token for service-to-service auth
# Used by: orchestrator, discord-bot
# This token secures communication between:
#   - Discord bot -> Orchestrator API
#   - Orchestrator -> Discord bot webhook
#   - Devbox pods -> Orchestrator callback
apiVersion: v1
kind: Secret
metadata:
  name: minions-internal-api
  namespace: minions
  labels:
    app.kubernetes.io/part-of: minions
type: Opaque
stringData:
  # Generate with: openssl rand -hex 32
  INTERNAL_API_TOKEN: "REPLACE_ME"

---
# Control Panel authentication credentials
# Used by: control-panel (NextAuth with OIDC provider)
apiVersion: v1
kind: Secret
metadata:
  name: minions-control-panel
  namespace: minions
  labels:
    app.kubernetes.io/part-of: minions
type: Opaque
stringData:
  # NextAuth secret for JWT signing
  # Generate with: openssl rand -hex 32
  NEXTAUTH_SECRET: "REPLACE_ME"
  # Public URL of the control panel (for OAuth callbacks)
  NEXTAUTH_URL: "https://your-control-panel-domain.example.com"
  # OIDC provider issuer URL (e.g., https://your-pocketid-instance.example.com)
  OIDC_ISSUER: "REPLACE_ME"
  # OIDC client credentials from your identity provider
  OIDC_CLIENT_ID: "REPLACE_ME"
  OIDC_CLIENT_SECRET: "REPLACE_ME"
  # Optional: Custom provider name displayed on sign-in page (default: "OIDC")
  # OIDC_PROVIDER_NAME: "PocketID"
  # Optional: Override OAuth scopes (default: "openid email profile")
  # OIDC_SCOPES: "openid email profile"
