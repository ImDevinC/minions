# Build and push Docker images on version tags
# Triggered by semantic-release creating tags like orchestrator-v1.0.0

name: Docker Build

on:
  push:
    tags:
      - 'orchestrator-v*'
      - 'discord-bot-v*'
      - 'control-panel-v*'
      - 'devbox-v*'
      - 'matrix-bot-v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/imdevinc/minions

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract service name (everything before -v)
          SERVICE="${TAG%-v*}"
          # Extract version (everything after service-)
          VERSION="${TAG#*-}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Parsed: service=$SERVICE, version=$VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ steps.parse.outputs.service }}
          tags: |
            type=raw,value=${{ steps.parse.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ steps.parse.outputs.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
