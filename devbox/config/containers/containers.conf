# Buildah/Podman container engine configuration
# https://github.com/containers/common/blob/main/docs/containers.conf.5.md

[engine]
# Use chroot isolation instead of OCI runtime for RUN instructions
# This is required in Kubernetes because:
# - OCI isolation tries to create nested namespaces (user, PID, mount)
# - Creating nested namespaces requires CAP_SYS_ADMIN
# - We intentionally don't grant CAP_SYS_ADMIN for security
# - Chroot isolation uses a simple chroot(2) call instead
isolation = "chroot"
