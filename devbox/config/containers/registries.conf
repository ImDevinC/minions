# Container registries configuration for Buildah/Skopeo
# This config is copied to ~/.config/containers/ at runtime

# Search registries - try docker.io first, then others
unqualified-search-registries = ["docker.io", "ghcr.io", "quay.io"]

# Short-name aliases for common images
[aliases]
"alpine" = "docker.io/library/alpine"
"ubuntu" = "docker.io/library/ubuntu"
"debian" = "docker.io/library/debian"
"node" = "docker.io/library/node"
"golang" = "docker.io/library/golang"
"python" = "docker.io/library/python"
